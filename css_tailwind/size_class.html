<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
<!-- size class is used for when it required same size of width and height  -->

    <div class="bg-pink-300 w-20 h-20">size</div>
    <br>
    <div class="bg-pink-300 size-20">size</div>
    <br>
    <!-- size-fit sets the width and height to fit the content -->
    <div class="bg-pink-300 size-fit">size</div>
    <br>
    <!-- size-full sets the width and height to full viewport -->
    <div class="bg-pink-300 size-full">size</div>
    <br>    
    <!-- size-screen sets the width and height to full viewport -->
    <div class="bg-pink-300 size-screen">size</div>

    
    
</body>
</html>
