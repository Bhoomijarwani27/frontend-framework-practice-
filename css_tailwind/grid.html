<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <!-- grid for layout and its do automaticlly for responsive design -->
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-red-300  col-span-2 p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
        <div class="bg-red-300  row-span-2 p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
    </div>
    <!-- col-span-2 used for making a cell span two columns -->
    <!-- row-span-2 used for making a cell span two rows -->
     <br>
     <div class="grid grid-cols-3 gap-4 md:grid-cols-2">
        <div class="bg-red-300   p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
        <div class="bg-red-300   p-10 border  border-red-900"></div>
        <div class="bg-red-300 p-10 border  border-red-900"></div>
    </div>
   <!-- breakpoint can be used to change the grid layout at different screen sizes -->
</body>
</html>
