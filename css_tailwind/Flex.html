<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="h-screen ">
    <div class="size-full flex  flex-col">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-green-300 size-20"></div>
        <div class="bg-blue-300 size-20"></div>
        <div class="bg-yellow-300 size-20"></div>
    </div>
    <!-- flex-col-reverse will reverse the order of flex items and if h-screen and full size is used for showing in bottom -->
    <div class="size-full flex  flex-col-reverse">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-green-300 size-20"></div>
        </div>
        <div class="size-full flex  items-center justify-center">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-green-300 size-20"></div>
        </div>
        <!-- flex-wrap will wrap the flex items to the next line if they don't fit in the container -->
        <div class="size-full flex flex-wrap">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-green-300 size-20"></div>
        <div class="bg-blue-300 size-20"></div>
        <div class="bg-yellow-300 size-20"></div>
        <div class="bg-red-300 size-20"></div>
        <div class="bg-green-400 size-20"></div>
        <div class="bg-blue-400 size-20"></div>
        </div>
        
    
</body>
</html>
